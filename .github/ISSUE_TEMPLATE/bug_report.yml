name: Bug report
description: 报告可复现的 Backdrop for Codex 缺陷
title: "[Bug]: "
labels:
  - bug
  - needs-triage
body:
  - type: markdown
    attributes:
      value: |
        感谢报告。安全或隐私漏洞不要在此公开，请按 SECURITY.md 使用 GitHub 私密漏洞报告。
        请删除聊天、令牌、用户名、媒体绝对路径和其他个人信息。

  - type: checkboxes
    id: support-scope
    attributes:
      label: 支持范围
      options:
        - label: 我使用 Windows 11 x64 和 Microsoft Store/MSIX 安装的官方 Codex 桌面应用。
          required: true
        - label: 我已搜索现有 Issue，未发现相同报告。
          required: true

  - type: input
    id: wallpaper-version
    attributes:
      label: Backdrop for Codex 版本
      description: 发行标签或完整 commit SHA；不要只写“最新”。
      placeholder: v1.0.0 或 0123456789abcdef...
    validations:
      required: true

  - type: input
    id: windows-version
    attributes:
      label: Windows 版本
      description: 运行 `winver` 后提供版本与 OS build。
      placeholder: Windows 11 24H2, OS Build 26100.x
    validations:
      required: true

  - type: input
    id: codex-version
    attributes:
      label: Codex 版本与安装来源
      placeholder: 版本号；Microsoft Store/MSIX
    validations:
      required: true

  - type: dropdown
    id: media-type
    attributes:
      label: 使用的媒体
      options:
        - 未选择/不相关
        - PNG
        - JPEG
        - WebP
        - MP4
        - WebM
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: 最小复现步骤
      description: 从干净启动开始，逐步说明操作；请用虚构路径替代真实绝对路径。
      placeholder: |
        1. 退出 Codex 和 Backdrop for Codex
        2. ...
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: 预期行为
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: 实际行为
      description: 包含稳定出现的错误文字，但不要粘贴敏感内容。
    validations:
      required: true

  - type: textarea
    id: diagnostics
    attributes:
      label: 已脱敏的诊断信息
      description: 可选。优先粘贴最少相关行；不要上传内存转储或真实设置文件。
      render: text

  - type: checkboxes
    id: privacy-check
    attributes:
      label: 隐私确认
      options:
        - label: 我已确认本报告不含聊天、凭据、令牌、用户名或真实媒体绝对路径。
          required: true

  - type: textarea
    id: additional-context
    attributes:
      label: 其他信息
      description: 例如是否可稳定复现、最近一次正常版本、相关 Issue。
