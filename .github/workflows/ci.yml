name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_CLI_TELEMETRY_OPTOUT: "1"
  DOTNET_NOLOGO: "1"
  NUGET_XMLDOC_MODE: skip

jobs:
  dco:
    name: DCO sign-off
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out pull request history
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Verify Signed-off-by trailers
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          $commits = @(git rev-list --reverse "$($env:BASE_SHA)..$($env:HEAD_SHA)")
          if ($LASTEXITCODE -ne 0) {
            throw "Unable to enumerate pull request commits."
          }
          if ($commits.Count -eq 0) {
            throw "No pull request commits were found."
          }

          $missing = [System.Collections.Generic.List[string]]::new()
          $trailerPattern = '(?im)^Signed-off-by:\s+[^<>\r\n]+\s+<[^<>\s]+@[^<>\s]+>\s*$'
          foreach ($commit in $commits) {
            $message = ((git show -s --format=%B $commit) -join "`n")
            if ($LASTEXITCODE -ne 0 -or $message -notmatch $trailerPattern) {
              $missing.Add($commit)
            }
          }

          if ($missing.Count -gt 0) {
            $short = $missing | ForEach-Object { $_.Substring(0, [Math]::Min(12, $_.Length)) }
            throw "Missing a valid DCO Signed-off-by trailer: $($short -join ', ')"
          }

          Write-Output "DCO sign-off verified for $($commits.Count) commit(s)."

  build-and-verify:
    name: Build and verify (.NET 10 / win-x64)
    runs-on: windows-2025
    timeout-minutes: 20

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Check out source
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false

      - name: Set up .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore .\BackdropForCodex.slnx --locked-mode

      - name: Verify formatting
        run: dotnet format .\BackdropForCodex.slnx --verify-no-changes --no-restore

      - name: Build
        run: dotnet build .\BackdropForCodex.slnx --configuration Release --no-restore

      - name: Run unit tests
        run: >-
          dotnet test .\BackdropForCodex.slnx
          --configuration Release
          --no-build
          --no-restore
          --filter "Category!=Integration"

      - name: Verify self-contained single-file publish
        run: |
          $publishDir = Join-Path $env:GITHUB_WORKSPACE "artifacts\ci-publish"
          dotnet publish .\src\BackdropForCodex.App\BackdropForCodex.App.csproj `
            --configuration Release `
            --runtime win-x64 `
            --self-contained true `
            --no-restore `
            --output $publishDir `
            -p:PublishSingleFile=true `
            -p:PublishTrimmed=false `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:DebugSymbols=false `
            -p:DebugType=None
          if ($LASTEXITCODE -ne 0) {
            throw "dotnet publish failed."
          }

          $files = @(Get-ChildItem -LiteralPath $publishDir -File)
          if ($files.Count -ne 1 -or $files[0].Name -ne "BackdropForCodex.exe") {
            throw "Expected exactly one BackdropForCodex.exe publish artifact."
          }
